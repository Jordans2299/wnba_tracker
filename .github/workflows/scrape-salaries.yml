name: Scrape WNBA salaries

on:
  # Runs every day at 10:00 UTC (~6 AM ET). Adjust as desired.
  schedule:
    - cron: "0 10 * * *"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-salaries
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: npm run scrape

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- data/salaries.json; then
            echo "No salary changes detected."
            exit 0
          fi

          git add data/salaries.json
          git commit -m "chore(data): refresh WNBA salaries $(date -u +'%Y-%m-%d')"
          git push
